name = "oetp-global"
compatibility_date = "2026-07-01"
main = "./out/_worker.js/index.js"

[assets]
directory = "./out"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "competence-db"
database_id = "a23e3497-2f70-48c4-9f95-af493a5e8204"

[[r2_buckets]]
binding = "DOCS"
bucket_name = "competence-documents"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "competence-images"

[vars]
# Same-origin route (functions/api/images/[[key]].ts) that streams uploads
# straight out of the IMAGES bucket — keeps the bucket private, no R2 public
# access or custom domain needed in the Cloudflare dashboard.
IMAGES_PUBLIC_BASE = "/api/images"
