# Publishes a tiny redirect page to GitHub Pages so that the old
# peaceable0909.github.io/OETP-Global/ URL forwards every visitor (including
# deep links) to the real site on Cloudflare. The actual site is built and
# deployed by Cloudflare Workers Builds — not by this workflow.
name: Publish GitHub Pages redirect

on:
  push:
    branches: ["main"]
    paths: ["ghpages/**", ".github/workflows/github-pages-redirect.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload redirect page
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ghpages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
